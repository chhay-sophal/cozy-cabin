<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Cabin New Tab - push against the wall</title>
    
    <!-- Google Fonts Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* 1. Root & Core Canvas Layout */
        html, body {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Full Screen Background Video */
        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. Liquid Glass Clock Overlay Structure */
        .clock-positioner {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            pointer-events: none;
            /* Creates a 3D perspective space for the capsule to move back and forth in depth */
            perspective: 1000px; 
        }

        .liquidGlass-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 2.5rem;
            
            pointer-events: auto; 
            cursor: pointer;

            padding: 1.2rem 3.5rem;
            background: rgba(255, 255, 255, 0.12);
            
            /* Resting State: Large, deep ambient shadow to make it feel like it is hovering 20px off the wall */
            box-shadow: 
                0 20px 35px rgba(0, 0, 0, 0.35), 
                0 0 20px rgba(0, 0, 0, 0.1);
            
            /* Snappy elastic spring curve when releasing the push */
            transition: all 0.5s cubic-bezier(0.25, 1.15, 0.45, 1.3);
            user-select: none;
        }

        /* --- THE HOVER STATE (Floating slightly higher) --- */
        .liquidGlass-wrapper:hover {
            /* Pulls the capsule slightly closer to the viewer along the Z-axis */
            transform: translateZ(15px); 
            background: rgba(255, 255, 255, 0.16); 
            
            /* Shadow expands and blurs more because the object is further away from the wall */
            box-shadow: 
                0 35px 55px rgba(0, 0, 0, 0.45), 
                0 0 30px rgba(255, 255, 255, 0.05);
        }

        /* --- THE PUSH-AGAINST-WALL (ACTIVE) STATE --- */
        .liquidGlass-wrapper:active {
            /* Slams it flat back into the wall (negative Z) and scales it down tiny bit */
            transform: translateZ(-25px) scale(0.94); 
            
            /* Edges flatten and tighten up slightly under the force */
            border-radius: 2.1rem;
            padding: 1.1rem 3.3rem;
            background: rgba(255, 255, 255, 0.22); /* Compressing the glass makes it more dense/visible */
            
            /* The shadow completely collapses into a razor-sharp, dark ring directly under the capsule */
            box-shadow: 
                0 2px 5px rgba(0, 0, 0, 0.6), 
                inset 0 0 15px rgba(0, 0, 0, 0.2);
            
            /* Instant response on click down, feels fast and immediate */
            transition: all 0.08s ease-out; 
        }

        /* Synchronize inner child layers */
        .liquidGlass-wrapper > div {
            border-radius: 2.5rem;
            transition: border-radius 0.4s ease;
        }
        .liquidGlass-wrapper:hover > div {
            border-radius: 2.5rem;
        }
        .liquidGlass-wrapper:active > div {
            border-radius: 2.1rem;
            transition: border-radius 0.08s ease-out;
        }

        /* Dynamic refraction map across the background stream */
        .liquidGlass-effect {
            position: absolute;
            z-index: 0;
            inset: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            filter: url(#glass-distortion);
            overflow: hidden;
        }

        /* Frosting tint barrier */
        .liquidGlass-tint {
            z-index: 1;
            position: absolute;
            inset: 0;
        }

        /* Gloss highlights and deep internal lighting curves */
        .liquidGlass-shine {
            position: absolute;
            inset: 0;
            z-index: 2;
            overflow: hidden;
            box-shadow: 
                inset 3px 3px 2px 0 rgba(255, 255, 255, 0.4),
                inset -2px -2px 2px 1px rgba(255, 255, 255, 0.2);
            transition: box-shadow 0.4s ease;
        }
        
        .liquidGlass-wrapper:hover .liquidGlass-shine {
            box-shadow: 
                inset 4px 4px 3px 0 rgba(255, 255, 255, 0.5),
                inset -2px -2px 2px 1px rgba(255, 255, 255, 0.25);
        }

        /* Flatten inner shine highlights down into the surface when pressed */
        .liquidGlass-wrapper:active .liquidGlass-shine {
            box-shadow: 
                inset 1px 1px 1px 0 rgba(255, 255, 255, 0.2),
                inset -1px -1px 1px 0px rgba(0, 0, 0, 0.2);
            transition: box-shadow 0.08s ease-out;
        }

        /* Puffy Clock Typography Shell */
        .liquidGlass-text {
            z-index: 3;
            position: relative;
        }

        .clock-time {
            font-family: 'Fredoka', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 2px;
            line-height: 1;
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
        }

        .liquidGlass-wrapper:hover .clock-time {
            text-shadow: 0px 8px 18px rgba(0, 0, 0, 0.25);
        }

        /* Pushes the text digits back with the capsule */
        .liquidGlass-wrapper:active .clock-time {
            transform: scale(0.96);
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.4);
            transition: all 0.08s ease-out;
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video class="background-video" src="cozy-cabin.mp4" autoplay loop muted playsinline></video>

    <!-- Liquid Glass Clock Capsule Setup -->
    <div class="clock-positioner">
        <div class="liquidGlass-wrapper">
            <div class="liquidGlass-effect"></div>
            <div class="liquidGlass-tint"></div>
            <div class="liquidGlass-shine"></div>
            <div class="liquidGlass-text">
                <div class="clock-time" id="clock">00:00:00</div>
            </div>
        </div>
    </div>

    <!-- Hidden Liquid Distortion SVG Filter Engine -->
    <svg style="display: none">
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01" numOctaves="1" seed="5" result="turbulence" />
            <feComponentTransfer in="turbulence" result="mapped">
                <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
                <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
                <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
            </feComponentTransfer>
            <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />
            <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight">
                <fePointLight x="-200" y="-200" z="300" />
            </feSpecularLighting>
            <feComposite in="specLight" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litImage" />
            <feDisplacementMap in="SourceGraphic" in2="softMap" scale="150" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <!-- External Script Reference -->
    <script src="index.js"></script>
</body>
</html>
