<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Cabin New Tab</title>
    
    <!-- Google Fonts Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Background Video -->
    <video class="background-video" src="cozy-cabin.mp4" autoplay loop muted playsinline></video>

    <!-- Liquid Glass Clock Capsule Setup -->
    <div class="clock-positioner">
        <div class="liquidGlass-wrapper liquidGlass-wrapper-interactive">
            <div class="liquidGlass-effect"></div>
            <div class="liquidGlass-tint"></div>
            <div class="liquidGlass-shine"></div>
            <div class="liquidGlass-text">
                <div class="clock-subtext" id="greeting">Hello</div>
                <div class="clock-time" id="clock">00:00:00</div>
                <div class="clock-subtext" id="date">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Glass Search Bar -->
    <div class="search-container">
        <form id="search-form" action="https://www.google.com/search" method="GET">
            <input type="text" id="search-input" name="q" placeholder="Search Google..." autocomplete="off" class="glass-search">
        </form>
    </div>

    <!-- Quick Links Dock -->
    <div class="dock-container">
        <div class="liquidGlass-wrapper liquidGlass-wrapper-interactive small-dock">
            <div class="liquidGlass-effect"></div>
            <div class="liquidGlass-tint"></div>
            <div class="liquidGlass-shine"></div>
            <div class="liquidGlass-text">
                <!-- Links will be injected here dynamically by JavaScript -->
                <div class="dock-links" id="dynamic-links"></div>
            </div>
        </div>
    </div>

    <!-- Floating Settings Gear -->
    <button class="dock-settings-btn" id="open-settings-btn">⚙️</button>

    <!-- Settings Overlay Modal -->
    <div class="settings-modal" id="settings-modal">
        <div class="liquidGlass-wrapper modal-content">
            <div class="liquidGlass-effect"></div>
            <div class="liquidGlass-tint"></div>
            <div class="liquidGlass-shine"></div>
            <div class="liquidGlass-text modal-inner">
                <!-- Insert this inside <div class="liquidGlass-text modal-inner"> right above <h3>Customize Quick Links</h3> -->
                <div class="settings-section">
                    <label class="setting-label">Default Search Engine</label>
                    
                    <!-- Custom Glass Dropdown Container -->
                    <div class="custom-dropdown" id="custom-dropdown">
                        <!-- Trigger/Header block mimicking your interactive buttons -->
                        <div class="custom-dropdown-trigger">
                            <div class="liquidGlass-text trigger-text" id="dropdown-trigger-text">Google</div>
                            <span class="dropdown-chevron">▼</span>
                        </div>

                        <!-- Pop-out Options Tray floating underneath -->
                        <div class="custom-dropdown-options" id="dropdown-options-tray">
                            <div class="dropdown-option-item" data-value="google">Google</div>
                            <div class="dropdown-option-item" data-value="bing">Bing</div>
                            <div class="dropdown-option-item" data-value="duckduckgo">DuckDuckGo</div>
                        </div>
                    </div>
                </div>
                <hr class="modal-divider">
                <h3>Customize Quick Links</h3>
                <div id="links-editor-list"></div>
                <div class="modal-actions">
                    <button id="add-link-btn" class="glass-btn">Add New Link</button>
                    <button id="save-links-btn" class="glass-btn save-btn">Save & Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Liquid Distortion SVG Filter Engine -->
    <svg style="display: none">
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01" numOctaves="1" seed="5" result="turbulence" />
            <feComponentTransfer in="turbulence" result="mapped">
                <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
                <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
                <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
            </feComponentTransfer>
            <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />
            <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight">
                <fePointLight x="-200" y="-200" z="300" />
            </feSpecularLighting>
            <feComposite in="specLight" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litImage" />
            <feDisplacementMap in="SourceGraphic" in2="softMap" scale="150" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <!-- External Script Reference -->
    <script src="index.js"></script>
</body>
</html>
